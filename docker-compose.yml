version: "3.8"

services:
  whisper-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: whisper-api:latest
    ports:
      - "8000:8000"
    environment:
      MODEL_ID: openai/whisper-small
      MODELS_DIR: /app/models
      RUNS_DIR: /app/runs
      CLEARML_ENABLED: "false"
      WHISPER_LANGUAGE: English
      WHISPER_TASK: transcribe
      WHISPER_DECODE_LANGUAGE: en
      ENABLE_AUDIO_PREPROCESS: "false"
    volumes:
      - models-data:/app/models
      - runs-data:/app/runs
      - ./dataset:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  models-data:
    driver: local
  runs-data:
    driver: local
